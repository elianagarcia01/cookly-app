name: CI

on:
  push:
    branches: [main, serafin]
  pull_request:
    branches: [main, serafin]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: npm install
      - run: npm test
